<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Финансы</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --txt:#eef1f6; --mut:#9aa3b2; --accent:#4f8cff; --green:#2ecc71; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); font-size:1rem; padding:16px; }
  h1 { font-size:1.3rem; margin:4px 0 16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; max-width:520px; margin:0 auto; }
  label { display:block; font-size:1rem; color:var(--mut); margin:14px 0 6px; }
  input[type=number], input[type=text] {
    width:100%; padding:14px; font-size:1.25rem; border-radius:10px;
    border:1px solid var(--line); background:#11141a; color:var(--txt); }
  .row { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { flex:1; min-width:72px; text-align:center; padding:12px 8px; font-size:1.05rem;
          border:1px solid var(--line); border-radius:10px; background:#11141a; color:var(--txt); cursor:pointer; user-select:none; }
  .chip.on { border-color:var(--accent); background:#16233f; color:#fff; }
  button.save { width:100%; margin-top:20px; padding:16px; font-size:1.2rem; font-weight:600;
                border:none; border-radius:12px; background:var(--accent); color:#fff; cursor:pointer; }
  button.save:active { transform:scale(.99); }
  #status { text-align:center; min-height:24px; margin-top:12px; font-size:1.05rem; color:var(--green); }
</style>
</head>
<body>
<div class="card">
  <h1>Запись расхода</h1>

  <label>Сумма</label>
  <input id="amount" type="number" inputmode="decimal" placeholder="0">

  <label>Валюта</label>
  <div class="row" id="currency">
    <div class="chip on" data-v="THB">THB</div>
    <div class="chip" data-v="RUB">RUB</div>
  </div>

  <label>Тип</label>
  <div class="row" id="type">
    <div class="chip on" data-v="расход">Расход</div>
    <div class="chip" data-v="доход">Доход</div>
  </div>

  <label>Категория</label>
  <div class="row" id="category">
    <div class="chip on" data-v="еда">Еда</div>
    <div class="chip" data-v="транспорт">Транспорт</div>
    <div class="chip" data-v="жильё">Жильё</div>
    <div class="chip" data-v="развлечения">Развлечения</div>
    <div class="chip" data-v="здоровье">Здоровье</div>
    <div class="chip" data-v="покупки">Покупки</div>
    <div class="chip" data-v="прочее">Прочее</div>
  </div>

  <label>Способ</label>
  <div class="row" id="method">
    <div class="chip on" data-v="нал">Нал</div>
    <div class="chip" data-v="карта">Карта</div>
    <div class="chip" data-v="банк">Банк</div>
  </div>

  <label>Заметка</label>
  <input id="note" type="text" placeholder="необязательно">

  <button class="save" id="save">Записать</button>
  <div id="status"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwH01RWSXRpdiGhjekXswBPbppXeJGGVAWt0zX2cNh9tUJh-tyfhuEj3egllhE5kno/exec";

function pick(id){ const g=document.getElementById(id);
  g.addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return;
    g.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); });
  return ()=> g.querySelector('.chip.on').dataset.v;
}
const getCurrency=pick('currency'), getType=pick('type'), getCategory=pick('category'), getMethod=pick('method');
const status=document.getElementById('status');

document.getElementById('save').onclick=async ()=>{
  const amount=document.getElementById('amount').value.trim();
  if(!amount){ status.style.color='#ff6b6b'; status.textContent='Введи сумму'; return; }
  const params=new URLSearchParams({
    amount, currency:getCurrency(), type:getType(),
    category:getCategory(), method:getMethod(),
    note:document.getElementById('note').value.trim()
  });
  status.style.color='#9aa3b2'; status.textContent='Отправляю…';
  try{
    await fetch(SCRIPT_URL+'?'+params.toString(), {method:'GET', mode:'no-cors'});
    status.style.color='#2ecc71'; status.textContent='✓ Записано';
    document.getElementById('amount').value=''; document.getElementById('note').value='';
  }catch(err){
    status.style.color='#ff6b6b'; status.textContent='Ошибка сети';
  }
};
</script>
</body>
</html>
